name: avoha

services:
  postgres:
    image: postgres:17
    container_name: avoha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: avoha
      POSTGRES_PASSWORD: avoha_dev
      POSTGRES_DB: avoha
    ports:
      - "5432:5432"
    volumes:
      - avoha_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avoha -d avoha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: avoha-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - avoha_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  avoha_pgdata:
  avoha_redisdata:
